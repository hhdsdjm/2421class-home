<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 — 高二（21）班</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-display: 'Outfit', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', 'Outfit', sans-serif;
            --bg-main: #faf8f3;
            --text-dark: #2c2416;
            --text-mid: #5e5340;
            --text-light: #9a8f7a;
            --accent: #c4553d;
            --border: #e8e2d4;
            --content-max: 720px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.85;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .bg-texture {
            position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.3;
            background: radial-gradient(ellipse at 50% 0%, rgba(196,85,61,0.05) 0%, transparent 60%);
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed; top: clamp(16px, 3vh, 24px); left: clamp(16px, 3vw, 28px); z-index: 999;
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px 9px 13px;
            background: rgba(255,255,255,0.88); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(200,190,170,0.4); border-radius: 28px;
            color: var(--text-mid); font-size: 0.88rem; font-weight: 500;
            text-decoration: none; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            cursor: pointer; font-family: inherit; letter-spacing: 0.02em;
        }
        .back-btn:hover { transform: translateX(-3px); box-shadow: 0 4px 20px rgba(0,0,0,0.10); background: rgba(255,255,255,0.96); color: var(--text-dark); }
        .back-btn:active { transform: translateX(-1px) scale(0.97); }
        .back-btn svg { width: 17px; height: 17px; transition: transform 0.35s ease; }
        .back-btn:hover svg { transform: translateX(-2px); }

        /* 文章容器 */
        .article {
            position: relative; z-index: 1;
            max-width: var(--content-max); margin: 0 auto;
            padding: 72px 24px 80px;
        }
        .article__back-link {
            display: inline-flex; align-items: center; gap: 6px;
            text-decoration: none; color: var(--text-light);
            font-size: 0.88rem; font-weight: 500; letter-spacing: 0.02em;
            margin-bottom: 40px;
            transition: color 0.25s ease;
        }
        .article__back-link:hover { color: var(--accent); }
        .article__back-link svg { width: 16px; height: 16px; }

        .article__meta {
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        .article__author {
            font-size: 0.92rem; font-weight: 600; color: var(--accent); letter-spacing: 0.02em;
        }
        .article__dot {
            width: 4px; height: 4px; border-radius: 50%; background: var(--border);
        }
        .article__date {
            font-size: 0.85rem; color: var(--text-light); letter-spacing: 0.02em;
        }
        .article__title {
            font-family: var(--font-display);
            font-size: clamp(1.7rem, 4.5vw, 2.5rem);
            font-weight: 800; letter-spacing: -0.025em;
            line-height: 1.2; margin-bottom: 36px;
            color: var(--text-dark);
        }
        .article__body p {
            font-size: 1.02rem; color: var(--text-mid); line-height: 2;
            margin-bottom: 24px; text-indent: 2em;
        }
        .article__body p:first-of-type { text-indent: 2em; }
        .article__body blockquote {
            margin: 28px 0; padding: 20px 28px;
            border-left: 3px solid var(--accent);
            background: rgba(196,85,61,0.05);
            border-radius: 0 4px 4px 0;
            font-style: italic;
            color: var(--text-mid);
        }
        .article__body blockquote p {
            text-indent: 0; margin-bottom: 0; font-size: 1.05rem;
        }
        .article__divider {
            text-align: center; margin: 48px 0 40px;
            color: var(--text-light); font-size: 0.85rem; letter-spacing: 0.1em;
            opacity: 0.5;
        }
        .article__footer {
            text-align: center; padding: 20px 0;
            border-top: 1px solid var(--border);
        }
        .article__footer a {
            display: inline-flex; align-items: center; gap: 6px;
            text-decoration: none; color: var(--accent);
            font-size: 0.95rem; font-weight: 600;
            transition: all 0.25s ease;
        }
        .article__footer a:hover { gap: 12px; }
        .article__footer a svg { width: 18px; height: 18px; }

        /* 状态提示 */
        .status-message {
            position: relative; z-index: 1;
            text-align: center; padding: 120px 20px;
            max-width: var(--content-max); margin: 0 auto;
            color: var(--text-light);
        }
        .status-message--loading svg {
            animation: spin 1s linear infinite;
        }
        .status-message svg {
            width: 48px; height: 48px;
            margin-bottom: 18px; opacity: 0.4;
        }
        .status-message p { font-size: 1rem; }
        .status-message a {
            color: var(--accent); font-weight: 600; text-decoration: none;
        }
        .status-message a:hover { text-decoration: underline; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .article { padding: 60px 18px 60px; }
            .article__body p { font-size: 0.95rem; text-indent: 1.5em; }
            .article__body blockquote { padding: 16px 20px; }
            .back-btn { padding: 7px 14px 7px 10px; font-size: 0.8rem; top: 12px; left: 12px; gap: 4px; }
            .back-btn svg { width: 15px; height: 15px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .back-btn { transition: none; }
            .status-message--loading svg { animation: none; }
        }
    </style>
</head>
<body>
    <div class="bg-texture"></div>

    <a href="index.html?back=1" class="back-btn" aria-label="返回首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>返回首页</span>
    </a>

    <!-- 动态渲染的文章内容 -->
    <div id="articleRoot">
        <div class="status-message status-message--loading">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line>
                <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                <line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line>
                <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
            </svg>
            <p>正在加载文章…</p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            var rootEl = document.getElementById('articleRoot');

            /* ── 获取 URL 参数 ── */
            function getParam(name) {
                var m = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
                return m ? decodeURIComponent(m[1]) : null;
            }

            /* ── 格式化日期 ── */
            function formatDate(dateStr) {
                if (!dateStr) return '';
                if (/[\u4e00-\u9fa5]/.test(dateStr)) return dateStr;
                var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateStr);
                if (m) {
                    return m[1] + '年' + parseInt(m[2], 10) + '月' + parseInt(m[3], 10) + '日';
                }
                return dateStr;
            }

            /* ── HTML 转义 ── */
            function escapeHtml(str) {
                if (!str) return '';
                return str
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            /* ── 渲染错误 ── */
            function renderError(msg, showBackLink) {
                var backHtml = showBackLink
                    ? '<br><br><a href="114514.html">← 返回文章广场</a>'
                    : '';
                rootEl.innerHTML =
                    '<div class="status-message">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                    '<circle cx="12" cy="12" r="10"></circle>' +
                    '<line x1="12" y1="8" x2="12" y2="12"></line>' +
                    '<line x1="12" y1="16" x2="12.01" y2="16"></line>' +
                    '</svg>' +
                    '<p>' + escapeHtml(msg) + '</p>' +
                    backHtml +
                    '</div>';
                // 更新页面标题
                document.title = '文章加载失败 — 高二（21）班';
            }

            /* ── 渲染文章 ── */
            function renderArticle(meta, content) {
                var displayDate = formatDate(meta.date);
                document.title = meta.title + ' — ' + meta.author + ' · 高二（21）班';

                // 将正文按空行分割为段落
                var paragraphs = content
                    .split(/\n\s*\n/)
                    .map(function(p) { return p.trim(); })
                    .filter(function(p) { return p.length > 0; });

                var bodyHtml = '';
                for (var i = 0; i < paragraphs.length; i++) {
                    var text = paragraphs[i];
                    // 检查是否是引用块（以 " 或 " 开头）
                    if (/^[""「『]/.test(text) && /[""」』]$/.test(text) && text.length < 60) {
                        bodyHtml += '<blockquote><p>' + escapeHtml(text) + '</p></blockquote>';
                    } else {
                        bodyHtml += '<p>' + escapeHtml(text) + '</p>';
                    }
                }

                rootEl.innerHTML =
                    '<article class="article">' +
                    '<a href="114514.html" class="article__back-link">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                    '<polyline points="15 18 9 12 15 6"></polyline>' +
                    '</svg>' +
                    '返回文章广场' +
                    '</a>' +
                    '<div class="article__meta">' +
                    '<span class="article__author">' + escapeHtml(meta.author) + '</span>' +
                    '<span class="article__dot"></span>' +
                    '<span class="article__date">' + escapeHtml(displayDate) + '</span>' +
                    '</div>' +
                    '<h1 class="article__title">' + escapeHtml(meta.title) + '</h1>' +
                    '<div class="article__body">' + bodyHtml + '</div>' +
                    '<div class="article__divider">· · ·</div>' +
                    '<div class="article__footer">' +
                    '<a href="114514.html">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                    '<line x1="19" y1="12" x2="5" y2="12"></line>' +
                    '<polyline points="12 19 5 12 12 5"></polyline>' +
                    '</svg>' +
                    '返回文章列表' +
                    '</a>' +
                    '</div>' +
                    '</article>';
            }

            /* ── 加载并渲染 ── */
            function loadArticle() {
                var articleId = getParam('id');

                if (!articleId) {
                    renderError('未指定文章 ID，请从文章广场选择一篇阅读。', true);
                    return;
                }

                // 第一步：加载 manifest 获取文章元数据
                fetch('./articles/manifest.json')
                    .then(function(res) {
                        if (!res.ok) throw new Error('Failed to load manifest (HTTP ' + res.status + ')');
                        return res.json();
                    })
                    .then(function(data) {
                        var articles = data.articles || data;
                        var found = null;
                        for (var i = 0; i < articles.length; i++) {
                            if (String(articles[i].id) === String(articleId)) {
                                found = articles[i];
                                break;
                            }
                        }

                        if (!found) {
                            throw new Error('ARTICLE_NOT_FOUND');
                        }

                        // 第二步：加载文章正文
                        return fetch('./articles/' + found.file)
                            .then(function(res) {
                                if (!res.ok) throw new Error('Failed to load article file (HTTP ' + res.status + ')');
                                return res.text();
                            })
                            .then(function(content) {
                                renderArticle(found, content);
                            });
                    })
                    .catch(function(err) {
                        if (err.message === 'ARTICLE_NOT_FOUND') {
                            renderError('未找到 ID 为 "' + articleId + '" 的文章。', true);
                        } else {
                            console.warn('文章加载失败:', err.message);
                            renderError('文章加载失败，请检查网络后返回重试。', true);
                        }
                    });
            }

            /* ── 启动 ── */
            loadArticle();
        })();
    </script>
</body>
</html>
