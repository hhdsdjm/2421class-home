
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高二（21）班 · 班级照片墙</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== 基础变量 ===== */
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-soft: rgba(99, 102, 241, 0.08);
            --accent: #f59e0b;
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== 背景装饰 ===== */
        .bg-decor {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-decor span {
            position: absolute;
            border-radius: 50%;
            opacity: 0.07;
            animation: floatBg 20s ease-in-out infinite;
        }
        .bg-decor span:nth-child(1) { width: 400px; height: 400px; background: var(--primary); top: -100px; right: -100px; }
        .bg-decor span:nth-child(2) { width: 300px; height: 300px; background: var(--accent); bottom: -50px; left: -80px; animation-delay: -5s; }
        .bg-decor span:nth-child(3) { width: 200px; height: 200px; background: #10b981; top: 40%; left: 60%; animation-delay: -10s; }
        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ===== 头部 ===== */
        .header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 48px 20px 32px;
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            color: white;
            margin-bottom: 32px;
        }
        .header-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .header p {
            font-size: 1.05rem;
            opacity: 0.85;
        }
        .header-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 24px;
        }
        .header-stat {
            text-align: center;
        }
        .header-stat-num {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .header-stat-label {
            font-size: 0.85rem;
            opacity: 0.75;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto 28px;
            padding: 0 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--bg-card);
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-soft);
        }
        .search-box input::placeholder { color: var(--text-light); }
        .search-box svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-light);
        }
        .sort-toggle {
            display: flex;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .sort-btn {
            padding: 10px 18px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .sort-btn.active {
            background: var(--primary);
            color: white;
        }
        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 4px;
        }
        .view-btn {
            padding: 6px 10px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.2s;
        }
        .view-btn.active {
            background: var(--primary);
            color: white;
        }
        .view-btn svg { width: 20px; height: 20px; display: block; }

        /* ===== 字母导航 ===== */
        .alpha-nav {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto 24px;
            padding: 0 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }
        .alpha-nav-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: var(--bg-card);
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .alpha-nav-btn:hover {
            background: var(--primary-soft);
            color: var(--primary);
        }
        .alpha-nav-btn.active {
            background: var(--primary);
            color: white;
        }
        .alpha-nav-btn.empty {
            opacity: 0.3;
            cursor: default;
        }

        /* ===== 照片墙网格 ===== */
        .photo-wall {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }

        /* 分组模式 */
        .group-section {
            margin-bottom: 14px;
            animation: fadeInUp 0.5s ease forwards;
        }
        .group-letter {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding-bottom: 4px;
            /* border-bottom: 2px solid var(--border); */
        }
        .group-letter-tag {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
        }
        .group-letter-line {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--border), transparent);
        }
        .group-count {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }
        .grid.list-view {
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* ===== 名片 ===== */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }
        .card-avatar {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: linear-gradient(135deg, #e0e7ff, #ede9fe);
        }
        .card-info {
            padding: 8px 10px;
            text-align: center;
        }
        .card-name {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
        }
        .card-initial {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 1px;
        }

        /* 列表视图名片 */
        .list-view .card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 16px;
        }
        .list-view .card-avatar {
            width: 56px;
            height: 56px;
            aspect-ratio: unset;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .list-view .card-info {
            padding: 0;
            text-align: left;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 灯箱（Lightbox）===== */
        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .lightbox.active {
            opacity: 1;
            visibility: visible;
        }
        .lightbox-content {
            position: relative;
            max-width: 420px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .lightbox.active .lightbox-content {
            transform: scale(1);
        }
        .lightbox-img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            background: #1e293b;
        }
        .lightbox-name {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 20px;
        }
        /* 描述文本区域 */
        .lightbox-desc {
            color: rgba(255,255,255,0.75);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-top: 12px;
            max-height: 160px;
            overflow-y: auto;
            text-align: center;
            padding: 0 4px;
            word-break: break-all;
        }
        .lightbox-desc.empty {
            color: rgba(255,255,255,0.35);
            font-style: italic;
            text-align: center;
        }
        .lightbox-desc::-webkit-scrollbar { width: 4px; }
        .lightbox-desc::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* 描述操作按钮 */
        .lightbox-desc-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 10px;
        }
        .desc-btn {
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px;
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .desc-btn svg { width: 14px; height: 14px; }
        .desc-btn:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.4);
            color: white;
        }
        .lightbox-close {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: white;
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
            z-index: 10;
        }
        .lightbox-close:hover {
            transform: scale(1.1);
            background: #fee2e2;
            color: #ef4444;
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,0.3); }
        .lightbox-nav.prev { left: -60px; }
        .lightbox-nav.next { right: -60px; }
        .lightbox-counter {
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
            margin-top: 12px;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state p { font-size: 1.05rem; }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .header h1 { font-size: 1.6rem; }
            .header-stats { gap: 20px; }
            .header-stat-num { font-size: 1.4rem; }
            .toolbar { padding: 0 16px; }
            .photo-wall { padding: 0 16px 40px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 8px; }
            .lightbox-nav.prev { left: 8px; }
            .lightbox-nav.next { right: 8px; }
            .lightbox-content { width: 85%; }
        }

        @media (prefers-reduced-motion: reduce) {
            .card, .bg-decor span { animation: none; opacity: 1; }
        }

        /* ===== 滚动到顶部按钮 ===== */
        .scroll-top-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            opacity: 0;
            visibility: hidden;
            transform: translateY(16px);
            transition: opacity 0.3s ease, visibility 0.3s ease, transform 0.3s ease, background 0.2s ease;
            z-index: 900;
        }
        .scroll-top-btn.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .scroll-top-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .scroll-top-btn:active {
            transform: translateY(0);
        }
        .scroll-top-btn svg {
            width: 24px;
            height: 24px;
            display: block;
        }
        @media (max-width: 640px) {
            .scroll-top-btn { bottom: 20px; right: 20px; width: 42px; height: 42px; }
            .scroll-top-btn svg { width: 20px; height: 20px; }
        }

        /* ===== 返回首页按钮 ===== */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px 9px 14px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            color: #333;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            font-family: inherit;
        }
        .back-btn:hover {
            transform: translateX(-3px) scale(1.03);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.95);
        }
        .back-btn:active {
            transform: translateX(-1px) scale(0.98);
        }
        .back-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }
        .back-btn:hover svg {
            transform: translateX(-2px);
        }
        @media (max-width: 640px) {
            .back-btn {
                padding: 7px 14px 7px 11px;
                font-size: 0.8rem;
                top: 12px;
                left: 12px;
                gap: 4px;
            }
            .back-btn svg { width: 16px; height: 16px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .back-btn, .back-btn svg { transition: none; }
            .back-btn:hover { transform: none; }
            .back-btn:hover svg { transform: none; }
        }
    </style>
</head>
<body>

<!-- 背景装饰 -->
<div class="bg-decor">
    <span></span><span></span><span></span>
</div>

<!-- 返回首页按钮 -->
<a href="index.html?back=1" class="back-btn" aria-label="返回首页">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>返回首页</span>
</a>

<!-- 头部 -->
<header class="header">
    <div class="header-badge">🎓 青春纪念册</div>
    <h1>高二（21）班 · 班级照片墙</h1>
    <p>四十八位同学，四十八份精彩</p>
    <div class="header-stats">
        <div class="header-stat">
            <div class="header-stat-num" id="statTotal"></div>
            <!-- <div class="header-stat-label">班级人数</div> -->
        </div>
        <div class="header-stat">
            <div class="header-stat-num" id="statLetters"></div>
            <!-- <div class="header-stat-label">姓氏首字母</div> -->
        </div>
    </div>
</header>

<!-- 工具栏 -->
<div class="toolbar">
    <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="searchInput" placeholder="搜索同学姓名...">
    </div>
</div>

<!-- 字母快捷导航 -->
<div class="alpha-nav" id="alphaNav"></div>

<!-- 照片墙主体 -->
<main class="photo-wall" id="photoWall"></main>

<!-- 灯箱 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-nav prev" onclick="event.stopPropagation(); navLightbox(-1)">‹</button>
    <div class="lightbox-content">
        <button class="lightbox-close" onclick="event.stopPropagation(); closeLightbox()">✕</button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
        <div class="lightbox-name" id="lightboxName"></div>
        <div class="lightbox-desc" id="lightboxDesc"></div>
        <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>
    <button class="lightbox-nav next" onclick="event.stopPropagation(); navLightbox(1)">›</button>
</div>

<!-- 滚动到顶部按钮 -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="回到顶部" onclick="scrollToTop()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
</button>

];

// ===== 照片路径规则 =====
// 每位同学的照片放在 assets/photos/ 目录下，文件名格式：姓名.jpg
// 例如：宋林安 → assets/photos/宋林安.jpg
// 只需把照片文件放入该目录并按"姓名.jpg"命名即可自动匹配。
// 支持的格式：.jpg / .png / .webp（在下方 PHOTO_EXT 中配置）
//
// 照片不存在时，页面会自动显示渐变色占位符（姓名首字 + 性别配色），
// 不会出现裂图。
const PHOTO_DIR = 'assets/photos/';
const PHOTO_EXT = '.jpg';

// ===== 描述文本路径规则 =====
// 每位同学的描述文本放在 assets/texts/ 目录下，文件名格式：姓名.txt
// 例如：宋林安 → assets/texts/宋林安.txt
// 灯箱底部会读取该文件内容并展示，文件不存在时显示"暂无描述信息"
const TEXT_DIR = 'assets/texts/';
const TEXT_EXT = '.txt';

function getTextPath(name) {
    return TEXT_DIR + name + TEXT_EXT;
}

function getPhotoPath(name) {
    return PHOTO_DIR + name + PHOTO_EXT;
}

// 生成占位符 SVG（图片加载失败时使用）
function getPlaceholderSvg(name, gender) {
    const ch = name[0];
    const colors = gender === 'F'
        ? ['%23fbcfe8', '%23f0abfc', '%23c084fc']   // 粉紫色系
        : ['%23bfdbfe', '%23a5b4fc', '%23818cf8'];   // 蓝紫色系
    return `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><defs><linearGradient id=%22g%22 x1=%220%25%22 y1=%220%25%22 x2=%22100%25%22 y2=%22100%25%22><stop offset=%220%25%22 stop-color=%22${colors[0]}%22/><stop offset=%2250%25%22 stop-color=%22${colors[1]}%22/><stop offset=%22100%25%22 stop-color=%22${colors[2]}%22/></linearGradient></defs><rect fill=%22url(%23g)%22 width=%22200%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2280%22 font-weight=%22bold%22 fill=%22rgba(255,255,255,0.7)%22>${ch}</text></svg>`;
}

// 初始化：为每位同学绑定本地照片路径
let students = allStudents.map((s, i) => ({
    ...s,
    id: i,
    photo: getPhotoPath(s.name),
    placeholder: getPlaceholderSvg(s.name, s.gender),
}));

let currentSort = 'alpha';
let currentView = 'grid';
let lightboxIndex = -1;
let filteredStudents = [...students];

// ===== 渲染字母导航 =====
function renderAlphaNav() {
    const nav = document.getElementById('alphaNav');
    const letters = [...new Set(students.map(s => s.initial))].sort();
    const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    
    nav.innerHTML = allLetters.map(letter => {
        const has = letters.includes(letter);
        return `<button class="alpha-nav-btn ${has ? '' : 'empty'}" 
                     ${has ? `onclick="scrollToLetter('${letter}')"` : ''}>${letter}</button>`;
    }).join('');
}

// ===== 滚动到指定字母 =====
function scrollToLetter(letter) {
    const el = document.getElementById(`group-${letter}`);
    if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // 高亮按钮
        document.querySelectorAll('.alpha-nav-btn').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`.alpha-nav-btn`);
        // 简单高亮处理
    }
}

// ===== 渲染照片墙 =====
function render() {
    const wall = document.getElementById('photoWall');
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    
    // 过滤
    filteredStudents = query
        ? students.filter(s => s.name.toLowerCase().includes(query))
        : [...students];
    
    // 排序
    if (currentSort === 'alpha') {
        filteredStudents.sort((a, b) => {
            if (a.initial !== b.initial) return a.initial.localeCompare(b.initial);
            return a.name.localeCompare(b.name, 'zh-CN');
        });
    }
    
    // 更新统计
    // document.getElementById('statTotal').textContent = filteredStudents.length;
    const uniqueLetters = [...new Set(filteredStudents.map(s => s.initial))].length;
    // document.getElementById('statLetters').textContent = uniqueLetters;
    
    // 空状态
    if (filteredStudents.length === 0) {
        wall.innerHTML = `
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <p>没有找到匹配「${escapeHtml(query)}」的同学</p>
            </div>`;
        return;
    }
    
    // 按首字母分组
    const groups = {};
    filteredStudents.forEach(s => {
        if (!groups[s.initial]) groups[s.initial] = [];
        groups[s.initial].push(s);
    });
    
    // 渲染
    const sortedLetters = Object.keys(groups).sort();
    wall.innerHTML = sortedLetters.map(letter => `
        <div class="group-section" id="group-${letter}">
            <div class="group-letter">
                <div class="group-letter-tag">${letter}</div>
                <div class="group-letter-line"></div>
                <span class="group-count">${groups[letter].length} 人</span>
            </div>
            <div class="grid ${currentView === 'list' ? 'list-view' : ''}" id="grid-${letter}">
                ${groups[letter].map((s, i) => `
                    <div class="card" style="animation-delay: ${i * 0.05}s" 
                         onclick="openLightbox(${students.findIndex(x => x.id === s.id)})">
                        <img class="card-avatar" src="${s.photo}" alt="${s.name}" 
                             onerror="this.onerror=null; this.src='${s.placeholder}'">
                        <div class="card-info">
                            <div class="card-name">${s.name}</div>
                            <div class="card-initial">${s.initial}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

// ===== 预加载所有描述文字（页面初始化时一次性读完） =====
const studentDescs = {};   // { name: descriptionText }

async function preloadDescriptions() {
    const results = await Promise.allSettled(
        students.map(s =>
            fetch(getTextPath(s.name))
                .then(resp => resp.ok ? resp.text() : Promise.reject())
                .then(text => ({ name: s.name, desc: text.trim() }))
        )
    );
    results.forEach(r => {
        if (r.status === 'fulfilled' && r.value.desc) {
            studentDescs[r.value.name] = r.value.desc;
        }
    });
}

// ===== 灯箱 =====
function openLightbox(globalIndex) {
    lightboxIndex = globalIndex;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function updateLightbox() {
    const s = students[lightboxIndex];
    if (!s) return;
    const img = document.getElementById('lightboxImg');
    img.src = s.photo;
    img.onerror = function() { this.onerror = null; this.src = s.placeholder; };
    document.getElementById('lightboxName').textContent = s.name;
    document.getElementById('lightboxCounter').textContent = `${lightboxIndex + 1} / ${students.length}`;
    
    // 直接从预加载的 Map 中取描述文字
    const descEl = document.getElementById('lightboxDesc');
    const desc = studentDescs[s.name];
    if (desc) {
        descEl.textContent = desc;
        descEl.classList.remove('empty');
    } else {
        descEl.textContent = '这个人很懒，什么也没有留下';
        descEl.classList.add('empty');
    }
}

function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox')) return;
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
}

function navLightbox(dir) {
    lightboxIndex += dir;
    if (lightboxIndex < 0) lightboxIndex = students.length - 1;
    if (lightboxIndex >= students.length) lightboxIndex = 0;
    updateLightbox();
}

// 键盘导航
document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
});

// ===== HTML 转义 =====
function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ===== 搜索输入 =====
document.getElementById('searchInput').addEventListener('input', () => render());

// ===== 滚动到顶部 =====
function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('scroll', () => {
    const btn = document.getElementById('scrollTopBtn');
    if (window.scrollY > 400) {
        btn.classList.add('visible');
    } else {
        btn.classList.remove('visible');
    }
}, { passive: true });

// ===== 初始化 =====
preloadDescriptions().then(() => {
    renderAlphaNav();
    render();
});
</script>
