<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高二（21）班 · 文章广场</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-display: 'Outfit', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', 'Outfit', sans-serif;

            --bg-main: #faf8f3;
            --bg-card: #ffffff;
            --bg-card-alt: #fdfbf6;
            --text-dark: #2c2416;
            --text-mid: #5e5340;
            --text-light: #9a8f7a;
            --accent: #c4553d;
            --accent-soft: rgba(196, 85, 61, 0.08);
            --accent-hover: #a84732;
            --border: #e8e2d4;
            --border-strong: #d4ccb8;
            --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
            --shadow-hover: 0 1px 3px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.08);
            --shadow-active: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.06);

            --content-max: 880px;
            --section-gap: clamp(16px, 2.5vw, 28px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg-main);
            color: var(--text-dark);
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== 装饰纹理 ===== */
        .bg-texture {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
            background:
                radial-gradient(ellipse at 0% 0%, rgba(196,85,61,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 100% 60%, rgba(140,120,80,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(180,150,100,0.03) 0%, transparent 55%);
        }

        /* ===== 返回首页按钮 ===== */
        .back-btn {
            position: fixed;
            top: clamp(16px, 3vh, 24px);
            left: clamp(16px, 3vw, 28px);
            z-index: 999;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px 9px 13px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(200, 190, 170, 0.4);
            border-radius: 28px;
            color: var(--text-mid);
            font-size: 0.88rem;
            font-weight: 500;
            text-decoration: none;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.02em;
        }
        .back-btn:hover {
            transform: translateX(-3px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
            background: rgba(255, 255, 255, 0.96);
            color: var(--text-dark);
        }
        .back-btn:active {
            transform: translateX(-1px) scale(0.97);
        }
        .back-btn svg {
            width: 17px;
            height: 17px;
            transition: transform 0.35s ease;
        }
        .back-btn:hover svg {
            transform: translateX(-2px);
        }

        /* ===== 页面头部 ===== */
        .page-header {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 80px 24px 56px;
            max-width: var(--content-max);
            margin: 0 auto;
        }
        .page-header__eyebrow {
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 16px;
        }
        .page-header__title {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-dark);
            margin-bottom: 14px;
            line-height: 1.15;
        }
        .page-header__subtitle {
            font-size: 1rem;
            color: var(--text-mid);
            max-width: 420px;
            margin: 0 auto;
            font-weight: 400;
            line-height: 1.6;
        }
        .page-header__divider {
            width: 40px;
            height: 3px;
            border-radius: 2px;
            background: var(--accent);
            margin: 28px auto 0;
            opacity: 0.6;
        }

        /* ===== 文章列表区 ===== */
        .articles-section {
            position: relative;
            z-index: 1;
            padding: 0 0 80px;
        }

        .articles-list {
            display: flex;
            flex-direction: column;
            gap: var(--section-gap);
        }

        /* ===== 文章卡片（全宽） ===== */
        .article-card {
            display: block;
            text-decoration: none;
            color: inherit;
            width: 100%;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.4s ease,
                        background-color 0.3s ease;
            animation: cardReveal 0.7s ease backwards;
        }

        .article-card__inner {
            max-width: var(--content-max);
            margin: 0 auto;
            padding: clamp(28px, 5vw, 44px) clamp(20px, 4vw, 36px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 2px;
            box-shadow: var(--shadow-card);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* 左侧彩色竖条装饰 */
        .article-card__inner::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            opacity: 0;
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease;
        }

        /* === 悬停/点击交互 === */
        .article-card:hover .article-card__inner {
            background: var(--bg-card-alt);
            box-shadow: var(--shadow-hover);
            border-color: var(--border-strong);
        }
        .article-card:hover .article-card__inner::before {
            opacity: 1;
            transform: scaleY(1);
        }
        .article-card:hover .article-card__arrow {
            opacity: 1;
            transform: translateX(0);
        }
        .article-card:hover .article-card__title {
            color: var(--accent-hover);
        }

        /* 点击态 */
        .article-card:active {
            transform: scale(0.995);
        }
        .article-card:active .article-card__inner {
            box-shadow: var(--shadow-active);
            transition: all 0.1s ease;
        }

        /* 焦点态（键盘无障碍） */
        .article-card:focus-visible {
            outline: none;
        }
        .article-card:focus-visible .article-card__inner {
            outline: 3px solid var(--accent);
            outline-offset: 4px;
        }

        /* 内容布局 */
        .article-card__meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }
        .article-card__author {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.02em;
        }
        .article-card__dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--border-strong);
        }
        .article-card__date {
            font-size: 0.82rem;
            color: var(--text-light);
            letter-spacing: 0.02em;
        }
        .article-card__heading {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            position: relative;
            z-index: 1;
        }
        .article-card__title {
            font-family: var(--font-display);
            font-size: clamp(1.25rem, 3vw, 1.7rem);
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.015em;
            line-height: 1.3;
            transition: color 0.35s ease;
        }
        .article-card__arrow {
            flex-shrink: 0;
            margin-top: 4px;
            opacity: 0.35;
            transform: translateX(-6px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--accent);
        }
        .article-card__arrow svg {
            width: 22px;
            height: 22px;
        }
        .article-card__excerpt {
            font-size: 0.95rem;
            color: var(--text-mid);
            line-height: 1.7;
            margin-top: 14px;
            position: relative;
            z-index: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 交替背景 */
        .article-card--alt .article-card__inner {
            background: var(--bg-card-alt);
        }
        .article-card--alt:hover .article-card__inner {
            background: var(--bg-card);
        }
        .article-card--alt .article-card__inner::before {
            background: #a08060;
        }

        /* 入场动画延迟通过 JS 动态设置 inline style */

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== 状态提示 ===== */
        .status-message {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
        }
        .status-message--loading svg {
            animation: spin 1s linear infinite;
        }
        .status-message svg {
            width: 48px;
            height: 48px;
            margin-bottom: 18px;
            opacity: 0.4;
        }
        .status-message p {
            font-size: 1rem;
        }
        .status-message__retry {
            display: inline-block;
            margin-top: 18px;
            padding: 10px 24px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
        }
        .status-message__retry:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(196,85,61,0.3);
        }
        .status-message__retry:active {
            transform: scale(0.97);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== 页脚 ===== */
        .page-footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px 24px 52px;
        }
        .page-footer p {
            font-size: 0.82rem;
            color: var(--text-light);
            letter-spacing: 0.03em;
        }

        /* ===== 滚动到顶部按钮 ===== */
        .scroll-top-btn {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 44px;
            height: 44px;
            border: 1px solid var(--border-strong);
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-mid);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            opacity: 0;
            visibility: hidden;
            transform: translateY(12px);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 900;
        }
        .scroll-top-btn.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .scroll-top-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(196,85,61,0.3);
            transform: translateY(-2px);
        }
        .scroll-top-btn:active {
            transform: translateY(0) scale(0.95);
        }
        .scroll-top-btn svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .page-header {
                padding: 60px 20px 40px;
            }
            .article-card__inner {
                padding: 24px 20px;
                border-radius: 0;
                border-left: none;
                border-right: none;
            }
            .article-card__arrow {
                display: none;
            }
            .article-card__excerpt {
                -webkit-line-clamp: 3;
            }
            .back-btn {
                padding: 7px 14px 7px 10px;
                font-size: 0.8rem;
                top: 12px;
                left: 12px;
                gap: 4px;
            }
            .back-btn svg { width: 15px; height: 15px; }
            .scroll-top-btn {
                bottom: 20px;
                right: 20px;
                width: 38px;
                height: 38px;
            }
            .scroll-top-btn svg { width: 18px; height: 18px; }
        }

        @media (max-width: 400px) {
            .page-header__title { font-size: 1.7rem; }
            .article-card__title { font-size: 1.15rem; }
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            .article-card { animation: none; }
            .article-card__inner,
            .article-card__inner::before,
            .article-card__arrow,
            .article-card__title { transition: none; }
            .back-btn { transition: none; }
            .scroll-top-btn { transition: none; }
            .status-message--loading svg { animation: none; }
        }
    </style>
</head>
<body>
    <!-- 背景纹理 -->
    <div class="bg-texture"></div>

    <!-- 返回首页按钮 -->
    <a href="index.html?back=1" class="back-btn" aria-label="返回首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>返回首页</span>
    </a>

    <!-- 页面头部 -->
    <header class="page-header">
        <p class="page-header__eyebrow">Article Square</p>
        <h1 class="page-header__title">文章广场</h1>
        <p class="page-header__subtitle">淘汰班史料 · 文人聚集地<br>每一篇文字，都是青春的注脚</p>
        <div class="page-header__divider"></div>
    </header>

    <!-- 文章列表（动态渲染） -->
    <main class="articles-section" aria-label="文章列表">
        <div class="articles-list" id="articlesList">
            <!-- 加载中 -->
            <div class="status-message status-message--loading" id="loadingState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line>
                    <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                    <line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line>
                    <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
                </svg>
                <p>正在加载文章…</p>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="page-footer">
        <p>&copy; 2026 高二（21）班 · 文章广场</p>
    </footer>

    <!-- 滚动到顶部按钮 -->
    <button class="scroll-top-btn" id="scrollTopBtn" aria-label="回到顶部">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script>
        (function() {
            'use strict';

            const listEl = document.getElementById('articlesList');
            const loadingEl = document.getElementById('loadingState');

            /* ── 本地回退数据（fetch 失败时使用） ── */
            var FALLBACK_ARTICLES = [
                {
                    id: "1",
                    title: "青春的模样",
                    author: "王一丁",
                    date: "2026-07-10",
                    file: "article-1.txt",
                    excerpt: "青春是什么模样？是清晨六点半的铃声，是课桌上刻下的梦想，是走廊里擦肩而过时偷偷的一瞥。我们在这个年纪拥有了最纯粹的执着……"
                },
                {
                    id: "2",
                    title: "那年夏天",
                    author: "孙慕然",
                    date: "2026-07-08",
                    file: "article-2.txt",
                    excerpt: "风，风！大风！——足球场上我们这样喊着。那一年夏天，蝉鸣聒噪，教室里的电扇吱呀旋转，我们在密不透风的题海里抬起头，望向窗外那片蓝得发烫的天空……"
                },
                {
                    id: "3",
                    title: "写给未来的自己",
                    author: "杜凌希瑶",
                    date: "2026-07-06",
                    file: "article-3.txt",
                    excerpt: "或许我们无法改变这个世界，但至少请不要被世界所改变。十年后的你，是否还记得今天坐在教室里的自己？是否还记得那些关于未来的……"
                }
            ];

            /* ── 移除加载状态 ── */
            function clearLoading() {
                if (loadingEl) loadingEl.remove();
            }

            /* ── 格式化日期 ── */
            function formatDate(dateStr) {
                if (!dateStr) return '';
                // 如果已经是中文格式，直接返回
                if (/[\u4e00-\u9fa5]/.test(dateStr)) return dateStr;
                // 尝试解析 ISO 日期
                var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateStr);
                if (m) {
                    return m[1] + '年' + parseInt(m[2], 10) + '月' + parseInt(m[3], 10) + '日';
                }
                return dateStr;
            }

            /* ── 生成箭头 SVG ── */
            function arrowSvg() {
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                    '<line x1="5" y1="12" x2="19" y2="12"></line>' +
                    '<polyline points="12 5 19 12 12 19"></polyline>' +
                    '</svg>';
            }

            /* ── 渲染文章卡片 ── */
            function renderArticles(articles) {
                clearLoading();

                if (!articles || articles.length === 0) {
                    listEl.innerHTML =
                        '<div class="status-message">' +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                        '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>' +
                        '</svg>' +
                        '<p>暂无文章，敬请期待</p>' +
                        '</div>';
                    return;
                }

                var html = '';
                for (var i = 0; i < articles.length; i++) {
                    var a = articles[i];
                    var isAlt = (i % 2 === 1);
                    var delay = (0.05 + i * 0.1).toFixed(2);
                    var displayDate = formatDate(a.date);

                    html +=
                        '<a href="article.html?id=' + a.id + '" class="article-card' + (isAlt ? ' article-card--alt' : '') + '"' +
                        ' style="animation-delay:' + delay + 's"' +
                        ' aria-label="阅读《' + a.title + '》，作者' + a.author + '">' +
                        '<div class="article-card__inner">' +
                        '<div class="article-card__meta">' +
                        '<span class="article-card__author">' + escapeHtml(a.author) + '</span>' +
                        '<span class="article-card__dot"></span>' +
                        '<span class="article-card__date">' + escapeHtml(displayDate) + '</span>' +
                        '</div>' +
                        '<div class="article-card__heading">' +
                        '<h2 class="article-card__title">' + escapeHtml(a.title) + '</h2>' +
                        '<span class="article-card__arrow">' + arrowSvg() + '</span>' +
                        '</div>' +
                        '<p class="article-card__excerpt">' + escapeHtml(a.excerpt || '') + '</p>' +
                        '</div>' +
                        '</a>';
                }
                listEl.innerHTML = html;
            }

            /* ── 渲染错误状态 ── */
            function renderError(retryFn) {
                clearLoading();
                listEl.innerHTML =
                    '<div class="status-message">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                    '<circle cx="12" cy="12" r="10"></circle>' +
                    '<line x1="12" y1="8" x2="12" y2="12"></line>' +
                    '<line x1="12" y1="16" x2="12.01" y2="16"></line>' +
                    '</svg>' +
                    '<p>文章加载失败，请检查网络后重试</p>' +
                    '<button class="status-message__retry" id="retryBtn">重新加载</button>' +
                    '</div>';

                var btn = document.getElementById('retryBtn');
                if (btn && typeof retryFn === 'function') {
                    btn.addEventListener('click', function() { retryFn(); });
                }
            }

            /* ── HTML 转义 ── */
            function escapeHtml(str) {
                if (!str) return '';
                return str
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            /* ── 确定 manifest 路径（兼容 GitHub Pages 子目录） ── */
            function getManifestUrl() {
                // 优先使用相对路径，自动适配当前页面所在目录
                return './articles/manifest.json';
            }

            /* ── 加载文章清单 ── */
            function loadArticles() {
                // 恢复加载状态
                listEl.innerHTML = '';
                listEl.appendChild(createLoadingEl());

                var url = getManifestUrl();
                fetch(url)
                    .then(function(res) {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.json();
                    })
                    .then(function(data) {
                        var articles = data.articles || data;
                        renderArticles(articles);
                    })
                    .catch(function(err) {
                        console.warn('无法从远端加载 manifest，使用本地回退数据。', err.message);
                        // 回退到本地数据
                        renderArticles(FALLBACK_ARTICLES);
                    });
            }

            /* ── 创建加载元素 ── */
            function createLoadingEl() {
                var div = document.createElement('div');
                div.className = 'status-message status-message--loading';
                div.id = 'loadingState';
                div.innerHTML =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                    '<line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line>' +
                    '<line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>' +
                    '<line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line>' +
                    '<line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>' +
                    '</svg>' +
                    '<p>正在加载文章…</p>';
                return div;
            }

            /* ── 滚动到顶部 ── */
            var scrollBtn = document.getElementById('scrollTopBtn');
            window.addEventListener('scroll', function() {
                scrollBtn.classList.toggle('visible', window.scrollY > 500);
            }, { passive: true });
            scrollBtn.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            /* ── 启动 ── */
            loadArticles();
        })();
    </script>
</body>
</html>
