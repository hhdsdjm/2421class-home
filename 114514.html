<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的青春主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --coral: #FF7B7B;
            --coral-light: #FFB4B4;
            --mint: #7FFFD4;
            --mint-dark: #5DD4B0;
            --sky: #87CEEB;
            --sky-soft: #B8E0F7;
            --sunshine: #FFD93D;
            --sunshine-soft: #FFF0B0;
            --white: #FFFFFF;
            --white-soft: rgba(255, 255, 255, 0.92);
            --white-glass: rgba(255, 255, 255, 0.75);
            --text-dark: #2D3748;
            --text-mid: #4A5568;
            --text-light: #718096;
            --border: rgba(255, 255, 255, 0.5);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.08);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            background: url('assets/images/A_vibrant_youth_themed_backgro_2026-07-05T09-12-30.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 背景遮罩层 — 不模糊，只轻微提亮 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.15) 0%,
                rgba(255, 255, 255, 0.35) 50%,
                rgba(255, 255, 255, 0.45) 100%
            );
            z-index: -1;
            pointer-events: none;
        }

        /* 飘落花瓣动画 */
        .petal {
            position: fixed;
            top: -10px;
            width: 12px;
            height: 12px;
            background: var(--coral-light);
            border-radius: 50% 0 50% 50%;
            opacity: 0.7;
            animation: fall linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10px) rotate(0deg) translateX(0);
                opacity: 0.7;
            }
            100% {
                transform: translateY(100vh) rotate(720deg) translateX(100px);
                opacity: 0;
            }
        }

        /* 主容器 */
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* ===== 个人资料区 ===== */
        .profile-section {
            background: var(--white-soft);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 28px;
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        @keyframes slideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            display: flex;
            align-items: flex-start;
            gap: 24px;
        }

        .avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: 0 4px 16px rgba(255, 123, 123, 0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .avatar:hover {
            transform: scale(1.08) rotate(3deg);
        }

        .avatar-ring {
            position: absolute;
            top: -6px;
            left: -6px;
            width: 112px;
            height: 112px;
            border-radius: 50%;
            border: 2px solid var(--coral-light);
            border-top-color: var(--coral);
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .profile-info {
            flex: 1;
            padding-top: 8px;
        }

        .profile-name {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }

        .profile-birthday {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: var(--text-mid);
            background: var(--sunshine-soft);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 500;
        }

        .profile-birthday svg {
            width: 18px;
            height: 18px;
            color: var(--sunshine);
        }

        .profile-bio {
            margin-top: 12px;
            font-size: 0.95rem;
            color: var(--text-light);
            line-height: 1.7;
        }

        /* ===== 留言发布区 ===== */
        .post-section {
            background: var(--white-soft);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 28px;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--coral), var(--sunshine));
            border-radius: 2px;
        }

        .post-input-wrapper {
            position: relative;
        }

        .post-textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px 20px;
            border: 2px solid rgba(80, 34, 34, 0.2);
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            background: var(--white);
            transition: all 0.3s ease;
            color: var(--text-dark);
            outline: none;
        }

        .post-textarea::placeholder {
            color: var(--text-light);
        }

        .post-textarea:focus {
            border-color: var(--coral);
            box-shadow: 0 0 0 4px rgba(255, 123, 123, 0.15);
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
        }

        .char-count {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .post-btn {
            background: linear-gradient(135deg, var(--coral), #ff5454);
            color: var(--white);
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 16px rgb(155, 155, 155);
        }

        .post-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 24px rgb(189, 189, 189);
        }

        .post-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* ===== 评论区 ===== */
        .comments-section {
            background: var(--white-soft);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px;
            box-shadow: var(--shadow-soft);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .comments-count {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .comment-card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(255, 142, 142, 0.6);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comment-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgb(153, 153, 153);
        }

        .comment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .comment-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--white);
            box-shadow: 0 2px 8px rgb(164, 164, 164);
        }

        .comment-meta {
            flex: 1;
        }

        .comment-author {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .comment-time {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .comment-content {
            font-size: 0.95rem;
            color: var(--text-mid);
            line-height: 1.7;
            margin-bottom: 14px;
            word-wrap: break-word;
        }

        .comment-actions {
            display: flex;
            gap: 16px;
            padding-top: 12px;
            border-top: 1px solid rgb(150, 150, 150);
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 16px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: rgb(144, 144, 144);
            color: var(--coral);
        }

        .action-btn.liked {
            color: var(--coral);
            background: rgb(149, 149, 149);
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .action-btn:hover svg,
        .action-btn.liked svg {
            transform: scale(1.15);
        }

        /* 回复区域 */
        .reply-section {
            margin-top: 12px;
            padding-left: 16px;
            border-left: 2px solid var(--coral-light);
        }

        .reply-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-top: 10px;
        }

        .reply-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid rgb(145, 145, 145);
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
            background: var(--white);
        }

        .reply-input:focus {
            border-color: var(--coral);
            box-shadow: 0 0 0 3px rgb(148, 148, 148);
        }

        .reply-submit {
            padding: 10px 20px;
            background: var(--coral);
            color: var(--white);
            border: none;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reply-submit:hover {
            background: #b6b6b6;
            transform: scale(1.05);
        }

        .replies-list {
            margin-top: 12px;
        }

        .reply-item {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .reply-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .reply-item-author {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dark);
        }

        .reply-item-time {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .reply-item-text {
            color: var(--text-mid);
            line-height: 1.6;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1rem;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 20px 16px;
            }

            .profile-section,
            .post-section,
            .comments-section {
                padding: 20px;
                border-radius: 20px;
            }

            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .avatar {
                width: 80px;
                height: 80px;
            }

            .avatar-ring {
                width: 92px;
                height: 92px;
                top: -6px;
                left: -6px;
            }

            .profile-name {
                font-size: 1.5rem;
            }

            .post-actions {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }

            .post-btn {
                width: 100%;
            }
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            .petal,
            .avatar-ring {
                animation: none;
            }
            .profile-section,
            .post-section,
            .comments-section,
            .comment-card {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }

        /* ===== 返回首页按钮 ===== */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px 9px 14px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            color: #333;
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            font-family: inherit;
        }
        .back-btn:hover {
            transform: translateX(-3px) scale(1.03);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.95);
        }
        .back-btn:active {
            transform: translateX(-1px) scale(0.98);
        }
        .back-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }
        .back-btn:hover svg {
            transform: translateX(-2px);
        }
        @media (max-width: 600px) {
            .back-btn {
                padding: 7px 14px 7px 11px;
                font-size: 0.8rem;
                top: 12px;
                left: 12px;
                gap: 4px;
            }
            .back-btn svg { width: 16px; height: 16px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .back-btn, .back-btn svg { transition: none; }
            .back-btn:hover { transform: none; }
            .back-btn:hover svg { transform: none; }
        }
    </style>
</head>

        const postBtn = document.getElementById('postBtn');
        const charCount = document.getElementById('charCount');
        const commentsList = document.getElementById('commentsList');
        const commentsCount = document.getElementById('commentsCount');

        // ===== 字符计数 =====
        postInput.addEventListener('input', () => {
            const len = postInput.value.length;
            charCount.textContent = `${len} 字`;
            if (len > 0) {
                charCount.style.color = 'var(--coral)';
            } else {
                charCount.style.color = 'var(--text-light)';
            }
        });

        // ===== 渲染留言列表 =====
        function renderComments() {
            if (comments.length === 0) {
                commentsList.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p>还没有留言，来写第一条吧！</p>
                    </div>
                `;
                commentsCount.textContent = '0 条留言';
                return;
            }

            commentsCount.textContent = `${comments.length} 条留言`;
            
            commentsList.innerHTML = comments.map(comment => `
                <div class="comment-card" data-id="${comment.id}">
                    <div class="comment-header">
                        <img src="${comment.avatar}" alt="${comment.author}" class="comment-avatar">
                        <div class="comment-meta">
                            <div class="comment-author">${comment.author}</div>
                            <div class="comment-time">${comment.time}</div>
                        </div>
                    </div>
                    <div class="comment-content">${escapeHtml(comment.content)}</div>
                    <div class="comment-actions">
                        <button class="action-btn ${comment.liked ? 'liked' : ''}" onclick="toggleLike(${comment.id})">
                            <svg viewBox="0 0 24 24" fill="${comment.liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            <span>${comment.likes}</span>
                        </button>
                        <button class="action-btn" onclick="toggleReply(${comment.id})">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                            </svg>
                            <span>评论 (${comment.replies.length})</span>
                        </button>
                    </div>
                    ${comment.showReply ? `
                        <div class="reply-section">
                            <div class="reply-input-wrapper">
                                <input type="text" class="reply-input" id="replyInput-${comment.id}" placeholder="回复 ${comment.author}..." onkeypress="if(event.key==='Enter') submitReply(${comment.id})">
                                <button class="reply-submit" onclick="submitReply(${comment.id})">发送</button>
                            </div>
                            ${comment.replies.length > 0 ? `
                                <div class="replies-list">
                                    ${comment.replies.map(reply => `
                                        <div class="reply-item">
                                            <div class="reply-item-header">
                                                <span class="reply-item-author">${reply.author}</span>
                                                <span class="reply-item-time">${reply.time}</span>
                                            </div>
                                            <div class="reply-item-text">${escapeHtml(reply.text)}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // ===== HTML 转义 =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== 点赞功能 =====
        function toggleLike(id) {
            const comment = comments.find(c => c.id === id);
            if (comment) {
                comment.liked = !comment.liked;
                comment.likes += comment.liked ? 1 : -1;
                renderComments();
            }
        }

        // ===== 切换回复区 =====
        function toggleReply(id) {
            const comment = comments.find(c => c.id === id);
            if (comment) {
                comment.showReply = !comment.showReply;
                renderComments();
                if (comment.showReply) {
                    setTimeout(() => {
                        const input = document.getElementById(`replyInput-${id}`);
                        if (input) input.focus();
                    }, 50);
                }
            }
        }

        // ===== 提交回复 =====
        function submitReply(id) {
            const input = document.getElementById(`replyInput-${id}`);
            const text = input.value.trim();
            if (!text) return;

            const comment = comments.find(c => c.id === id);
            if (comment) {
                const now = new Date();
                const timeStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                comment.replies.push({
                    author: '林小夏',
                    avatar: 'assets/images/Cute_anime_style_avatar_portra_2026-07-05T09-12-45.png',
                    time: timeStr,
                    text: text
                });
                renderComments();
            }
        }

        // ===== 发布留言 =====
        postBtn.addEventListener('click', () => {
            const content = postInput.value.trim();
            if (!content) {
                postInput.style.borderColor = 'var(--coral)';
                setTimeout(() => {
                    postInput.style.borderColor = '';
                }, 1000);
                return;
            }

            const now = new Date();
            const timeStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            const newComment = {
                id: Date.now(),
                author: '林小夏',
                avatar: 'assets/images/Cute_anime_style_avatar_portra_2026-07-05T09-12-45.png',
                time: timeStr,
                content: content,
                likes: 0,
                liked: false,
                showReply: false,
                replies: []
            };

            comments.unshift(newComment);
            postInput.value = '';
            charCount.textContent = '0 字';
            charCount.style.color = 'var(--text-light)';
            renderComments();
        });

        // ===== 初始化渲染 =====
        renderComments();
    </script>
</body>
</html>
