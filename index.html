<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高二（21）班 · 班级主页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== 基础变量 ===== */
        :root {
            --font-display: 'Outfit', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', 'Outfit', sans-serif;
            --splash-bg: url('assets/images/A_vibrant_youth_themed_backgro_2026-07-05T09-12-30.png');

            /* 五种卡片配色 */
            --c1-from: #FF6B6B;  --c1-to: #FF8E53;  --c1-shadow: rgba(255,107,107,0.35);
            --c2-from: #4A90D9;  --c2-to: #5BB0F5;  --c2-shadow: rgba(74,144,217,0.35);
            --c3-from: #20C2A0;  --c3-to: #3DDDB8;  --c3-shadow: rgba(32,194,160,0.35);
            --c4-from: #F5A623;  --c4-to: #FFC55C;  --c4-shadow: rgba(245,166,35,0.35);
            --c5-from: #7C6BE3;  --c5-to: #A08AEF;  --c5-shadow: rgba(124,107,227,0.35);

            --text-dark: #2D3748;
            --text-mid: #4A5568;
            --text-light: #8B95A5;
            --white: #FFFFFF;

            /* 统一布局间距系统 */
            --max-width: 1080px;
            --padding-x: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: #f0f2f8;
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 欢迎启动页 ===== */
        .splash {
            position: fixed;
            inset: 0;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .splash--hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash__bg {
            position: absolute;
            inset: 0;
            background: var(--splash-bg) no-repeat center center;
            background-size: cover;
            animation: kenBurns 25s ease-in-out infinite alternate;
        }

        @keyframes kenBurns {
            0%   { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.12) translate(-2%, -3%); }
        }

        .splash__overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(0,0,0,0.55) 0%,
                rgba(0,0,0,0.30) 50%,
                rgba(0,0,0,0.60) 100%
            );
        }

        .splash__content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            padding: 24px;
        }

        .splash__eyebrow {
            font-family: var(--font-display);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            opacity: 0.75;
            margin-bottom: 24px;
            animation: splashIn 1s ease 0.3s both;
        }

        .splash__title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 18px;
            text-shadow: 0 4px 40px rgba(0,0,0,0.35);
            animation: splashIn 1s ease 0.5s both;
        }

        .splash__subtitle {
            font-size: clamp(1rem, 2.5vw, 1.35rem);
            font-weight: 300;
            opacity: 0.88;
            margin-bottom: 64px;
            letter-spacing: 0.05em;
            animation: splashIn 1s ease 0.7s both;
        }

        .splash__hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            animation: splashIn 1s ease 0.9s both;
        }

        .splash__hint-text {
            font-size: 0.9rem;
            opacity: 0.65;
            letter-spacing: 0.1em;
            animation: hintPulse 2.2s ease-in-out infinite 1.9s;
        }

        .splash__arrow {
            width: 26px;
            height: 26px;
            opacity: 0.6;
            stroke: var(--white);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: bounceDown 2.2s ease-in-out infinite 1.9s;
        }

        @keyframes splashIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.55; }
            50%      { opacity: 0.95; }
        }

        @keyframes bounceDown {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(10px); }
        }

        @keyframes kenBurns {
            0%   { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.12) translate(-2%, -3%); }
        }

        /* ===== 主页面 ===== */
        .main {
            min-height: 100vh;
            background: linear-gradient(160deg, #f7f8fd 0%, #eef1fb 45%, #f4f0ff 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .main--visible { opacity: 1; }

        /* 装饰光斑 */
        .main__decor {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .main__decor--1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(255,107,107,0.10), transparent 65%);
            top: -160px; right: -140px;
        }

        .main__decor--2 {
            width: 440px; height: 440px;
            background: radial-gradient(circle, rgba(124,107,227,0.10), transparent 65%);
            bottom: -120px; left: -100px;
        }

        .main__decor--3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(32,194,160,0.08), transparent 65%);
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 页面头部 */
        .main__header {
            text-align: center;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 72px var(--padding-x) 44px;
            position: relative;
            z-index: 2;
        }

        .main__eyebrow {
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 14px;
        }

        .main__title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4.5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .main__subtitle {
            font-size: 0.95rem;
            color: var(--text-mid);
            max-width: 480px;
            margin: 12px auto 0;
        }

        .main__divider {
            width: 48px;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--c1-from), var(--c5-to));
            margin: 24px auto 0;
        }

        /* ===== 导航卡片网格 ===== */
        .nav-grid {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 var(--padding-x) 60px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 196px;
            gap: 22px;
            position: relative;
            z-index: 2;
        }

        /* 卡片基础样式 */
        .nav-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 28px;
            border-radius: 24px;
            text-decoration: none;
            color: var(--white);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(34px);
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.45s ease;
        }

        /* 卡片内光效 */
        .nav-card::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -30%;
            width: 180%;
            height: 180%;
            background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 45%);
            opacity: 0;
            transition: opacity 0.45s ease;
            pointer-events: none;
        }

        /* 卡片装饰圆 */
        .nav-card::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            pointer-events: none;
            transition: transform 0.6s ease;
        }

        /* 主页面可见后：触发入场动画 + 设置终态 */
        .main--visible .nav-card {
            opacity: 1;
            transform: translateY(0);
            animation: cardIn 0.65s ease backwards;
        }

        .main--visible .nav-card--1 { animation-delay: 0.10s; }
        .main--visible .nav-card--2 { animation-delay: 0.20s; }
        .main--visible .nav-card--3 { animation-delay: 0.30s; }
        .main--visible .nav-card--4 { animation-delay: 0.40s; }
        .main--visible .nav-card--5 { animation-delay: 0.50s; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(34px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 悬停动效 */
        .nav-card:hover {
            transform: translateY(-10px) scale(1.025);
        }

        .nav-card:hover::before { opacity: 1; }
        .nav-card:hover::after  { transform: scale(1.4); }
        .nav-card:hover .nav-card__icon { transform: scale(1.12) rotate(-6deg); }
        .nav-card:hover .nav-card__arrow { transform: translateX(8px); opacity: 1; }

        /* 卡片内部元素 */
        .nav-card__icon {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.22);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
        }

        .nav-card__icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--white);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-card__content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .nav-card__title {
            font-family: var(--font-display);
            font-size: 1.45rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.01em;
        }

        .nav-card__desc {
            font-size: 0.88rem;
            opacity: 0.82;
            font-weight: 400;
        }

        .nav-card__arrow {
            position: absolute;
            top: 30px;
            right: 28px;
            opacity: 0.6;
            transition: transform 0.35s ease, opacity 0.35s ease;
        }

        .nav-card__arrow svg {
            width: 22px;
            height: 22px;
            stroke: var(--white);
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ===== 网格布局：非对称排布 ===== */
        /* 卡片1：大卡片，左上 2列×2行 */
        .nav-card--1 {
            grid-column: 1 / 3;
            grid-row: 1 / 3;
            background: linear-gradient(135deg, var(--c1-from), var(--c1-to));
            box-shadow: 0 10px 30px var(--c1-shadow);
        }
        .nav-card--1:hover { box-shadow: 0 20px 50px var(--c1-shadow); }

        /* 卡片2：宽卡片，右上 2列×1行 */
        .nav-card--2 {
            grid-column: 3 / 5;
            grid-row: 1 / 2;
            background: linear-gradient(135deg, var(--c2-from), var(--c2-to));
            box-shadow: 0 10px 30px var(--c2-shadow);
        }
        .nav-card--2:hover { box-shadow: 0 20px 50px var(--c2-shadow); }

        /* 卡片3：小卡片，中右 */
        .nav-card--3 {
            grid-column: 3 / 4;
            grid-row: 2 / 3;
            background: linear-gradient(135deg, var(--c3-from), var(--c3-to));
            box-shadow: 0 10px 30px var(--c3-shadow);
        }
        .nav-card--3:hover { box-shadow: 0 20px 50px var(--c3-shadow); }

        /* 卡片4：小卡片，中右（与卡片3对齐） */
        .nav-card--4 {
            grid-column: 4 / 5;
            grid-row: 2 / 3;
            background: linear-gradient(135deg, var(--c4-from), var(--c4-to));
            box-shadow: 0 10px 30px var(--c4-shadow);
        }
        .nav-card--4:hover { box-shadow: 0 20px 50px var(--c4-shadow); }

        /* 卡片5：横幅卡片，底部通栏 */
        .nav-card--5 {
            grid-column: 1 / 5;
            grid-row: 3 / 4;
            background: linear-gradient(135deg, var(--c5-from), var(--c5-to));
            box-shadow: 0 10px 30px var(--c5-shadow);
        }
        .nav-card--5:hover { box-shadow: 0 20px 50px var(--c5-shadow); }

        /* 大卡片特殊内容布局 */
        .nav-card--1 .nav-card__title { font-size: 1.8rem; }
        .nav-card--1 .nav-card__desc  { font-size: 0.95rem; }

        .nav-card--5 {
            flex-direction: row;
            align-items: center;
            gap: 24px;
        }
        .nav-card--5 .nav-card__content { justify-content: center; }
        .nav-card--5 .nav-card__title { font-size: 1.6rem; }
        .nav-card--5 .nav-card__arrow { position: static; opacity: 0.7; }

        /* ===== 页脚 ===== */
        .main__footer {
            text-align: center;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 20px var(--padding-x) 48px;
            position: relative;
            z-index: 2;
        }

        .main__footer p {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.8;
        }

        .main__footer-sub {
            font-size: 0.8rem !important;
            opacity: 0.7;
        }

        /* ===== 响应式：平板 ===== */
        @media (max-width: 900px) {
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-auto-rows: minmax(170px, auto);
                gap: 18px;
            }

            /* 所有卡片自适应填充 */
            .nav-card--1,
            .nav-card--2,
            .nav-card--3,
            .nav-card--4,
            .nav-card--5 {
                grid-column: auto;
                grid-row: auto;
                align-self: stretch;
            }

            /* 卡片5通栏 */
            .nav-card--5 { grid-column: 1 / -1; }
        }

        /* ===== 响应式：手机 ===== */
        @media (max-width: 560px) {
            :root { --padding-x: 16px; }

            .nav-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: auto;
                gap: 16px;
                padding: 0 var(--padding-x) 40px;
            }

            .nav-card {
                min-height: 130px;
                padding: 24px;
                margin-top: 0 !important;
            }

            .nav-card--5 { flex-direction: column; align-items: flex-start; }
            .nav-card--5 .nav-card__arrow { position: absolute; top: 24px; right: 24px; }

            .main__header { padding: 52px var(--padding-x) 32px; }
        }

        /* ===== 减少动画偏好 ===== */
        @media (prefers-reduced-motion: reduce) {
            .splash__bg { animation: none; }
            .splash__hint-text { animation: none; }
            .splash__arrow { animation: none; }
            .splash__eyebrow,
            .splash__title,
            .splash__subtitle,
            .splash__hint { animation: none; opacity: 1; transform: none; }
            .nav-card { transition: box-shadow 0.3s ease; }
            .main--visible .nav-card { animation: none; opacity: 1; transform: none; }
        }

        /* ===== 从子页面返回时跳过启动页 ===== */
        html.skip-splash .splash { display: none !important; }
        html.skip-splash .main { opacity: 1; transition: none; }
    </style>
    <script>
        // 检测是否从子页面返回（URL 带 ?back=1 参数）
        // 若是，跳过封面启动页，直接显示主页面
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('back') === '1') {
                document.documentElement.classList.add('skip-splash');
                // 清除 URL 参数，使刷新时恢复封面展示
                history.replaceState(null, '', window.location.pathname);
            }
        })();
    </script>
</head>
<body>
    <!-- ===== 欢迎启动页 ===== -->
    <div class="splash" id="splash" role="button" tabindex="0" aria-label="点击进入班级主页">
        <div class="splash__bg"></div>
        <div class="splash__overlay"></div>
        <div class="splash__content">
            <p class="splash__eyebrow">Welcome</p>
            <h1 class="splash__title">高二（21）班</h1>
            <p class="splash__subtitle">青春不散场 &middot; 记忆永珍藏</p>
            <div class="splash__hint">
                <span class="splash__hint-text">点击任意位置进入</span>
                <svg class="splash__arrow" viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <polyline points="19 12 12 19 5 12"></polyline>
                </svg>
            </div>
        </div>
    </div>

    <!-- ===== 主页面 ===== -->

            <p class="main__subtitle">探索我们的青春记忆，点击下方卡片进入各个版块</p>

        <!-- 导航卡片网格 -->
        <nav class="nav-grid">

                </div>
                <div class="nav-card__arrow">
                    <svg viewBox="0 0 24 24">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>

            <!-- 卡片2：照片墙（海洋蓝，宽卡片） -->
            <a href="photo-wall.html" class="nav-card nav-card--2">
                <div class="nav-card__icon">
                    <svg viewBox="0 0 24 24">

                <div class="nav-card__content">

                <div class="nav-card__arrow">

                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>

            <!-- 卡片3：时光轴（薄荷绿，小卡片偏下） -->
            <a href="timeline.html" class="nav-card nav-card--3">
                <div class="nav-card__icon">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <div class="nav-card__content">
                    <h2 class="nav-card__title">时光轴</h2>
                    <p class="nav-card__desc">岁月流转</p>
                </div>
                <div class="nav-card__arrow">
                    <svg viewBox="0 0 24 24">

                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </div>
            </a>

            <!-- 卡片4：班级相册（琥珀金，小卡片偏上） -->
            <a href="#" class="nav-card nav-card--4" onclick="event.preventDefault();return false;">
                <div class="nav-card__icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                    </svg>
                </div>
                <div class="nav-card__content">
                    <h2 class="nav-card__title">班级相册</h2>
                    <p class="nav-card__desc">精彩瞬间</p>
                </div>
                <div class="nav-card__arrow">
                    <svg viewBox="0 0 24 24">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>

        <style>
            .splash { display: none !important; }
            .main { opacity: 1 !important; }
            .nav-card { opacity: 1 !important; transform: none !important; animation: none !important; }
        </style>
    </noscript>

    <script>
        (function() {
            var splash = document.getElementById('splash');
            var main   = document.getElementById('main');
            var skipSplash = document.documentElement.classList.contains('skip-splash');

            // ===== 从子页面返回：跳过启动页 =====
            if (skipSplash) {
                // splash 已被 CSS 隐藏(display:none)、main 已设为 opacity:1
                // 使用 rAF 确保浏览器完成首帧 CSS 布局后再触发卡片入场动画，避免闪烁
                requestAnimationFrame(function() {
                    main.classList.add('main--visible');
                });
                return;
            }

            // ===== 正常流程：首次访问或刷新，展示启动页 =====
            var dismissed = false;

            function dismissSplash() {
                if (dismissed) return;
                dismissed = true;
                // 启动页淡出
                splash.classList.add('splash--hidden');
                // 300ms后主页面开始淡入（与启动页淡出交叉，实现平滑过渡）
                setTimeout(function() {
                    main.classList.add('main--visible');
                }, 300);
                // 800ms后完全移除启动页
                setTimeout(function() {
                    splash.style.display = 'none';
                }, 800);
            }

            // 点击任意位置进入
            splash.addEventListener('click', dismissSplash);

            // 键盘无障碍：Enter / Space
            splash.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
                    e.preventDefault();
                    dismissSplash();
                }
            });

            // bfcache 恢复处理：浏览器前进/后退缓存恢复时确保状态正确
            window.addEventListener('pageshow', function(e) {
                if (e.persisted && dismissed) {
                    splash.style.display = 'none';
                    main.classList.add('main--visible');
                }
            });
        })();
    </script>
